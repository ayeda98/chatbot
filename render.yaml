services:
  - type: web
    name: chatbot-juridique-benin
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: VERIFY_TOKEN
        value: mon_token_secret_123
      - key: PAGE_ACCESS_TOKEN
        sync: false   # À remplir dans le dashboard Render
      - key: GROQ_API_KEY
        sync: false   # À remplir dans le dashboard Render
